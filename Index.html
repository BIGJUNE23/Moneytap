<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CarCoin Tap – Grind Mode</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(to bottom, #000, #111);
      color: #0f0;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      user-select: none;
      overflow: hidden;
    }
    h1 {
      font-size: 2.5rem;
      margin: 20px 0;
      text-shadow: 0 0 15px #0f0;
    }
    #score {
      font-size: 7rem;
      font-weight: bold;
      margin: 20px 0;
      text-shadow: 0 0 25px #0f0;
    }
    #tapArea {
      width: 240px;
      height: 240px;
      background: #111;
      border: 5px solid #0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 40px #0f0;
      transition: all 0.08s;
    }
    #tapArea:active {
      transform: scale(0.90);
      box-shadow: 0 0 60px #0f0;
    }
    #status {
      margin-top: 40px;
      font-size: 1.3rem;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <h1>CarCoin Tap</h1>
  <div id="score">0</div>
  <div id="tapArea">TAP</div>
  <div id="status">Energy: ∞ • +1 per tap • Survival mode</div>

  <script>
    let score = 0;
    const scoreEl = document.getElementById('score');
    const tapBtn = document.getElementById('tapArea');
    const statusEl = document.getElementById('status');

    tapBtn.addEventListener('click', () => {
      score++;
      scoreEl.textContent = score.toLocaleString();
      
      if (window.Telegram?.WebApp) {
        Telegram.WebApp.HapticFeedback.impactOccurred('heavy');
      }
      
      if (score % 100 === 0) {
        statusEl.textContent = `Milestone: ${score.toLocaleString()} CarCoins – keep grinding`;
      }
    });

    // Optimize for Telegram mini app
    if (window.Telegram?.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      Telegram.WebApp.MainButton.setText("Share to earn more");
      Telegram.WebApp.MainButton.show();
      Telegram.WebApp.MainButton.onClick(() => {
        Telegram.WebApp.openTelegramLink("https://t.me/share/url?url=" + encodeURIComponent(window.location.href));
      });
    }
  </script>
</body>
</html>
